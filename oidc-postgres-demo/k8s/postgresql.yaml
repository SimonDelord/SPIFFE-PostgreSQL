apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: oidc-postgres-demo
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres-admin-password
  POSTGRES_DB: demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-config
  namespace: oidc-postgres-demo
data:
  # Azure Entra ID configuration - UPDATE THESE VALUES
  AZURE_TENANT_ID: "YOUR_TENANT_ID"
  AZURE_CLIENT_ID: "YOUR_CLIENT_ID"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: oidc-postgres-demo
data:
  init.sql: |
    -- Create sample table for demo
    CREATE TABLE IF NOT EXISTS products (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        description TEXT,
        price DECIMAL(10,2),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Insert sample data
    INSERT INTO products (name, description, price) VALUES
        ('Widget A', 'A high-quality widget for all your needs', 29.99),
        ('Gadget B', 'The latest gadget with advanced features', 149.99),
        ('Tool C', 'Professional-grade tool for experts', 79.99),
        ('Device D', 'Smart device with IoT connectivity', 199.99),
        ('Component E', 'Essential component for your projects', 9.99);
    
    -- Create access log table to track OIDC-authenticated users
    CREATE TABLE IF NOT EXISTS access_log (
        id SERIAL PRIMARY KEY,
        subject VARCHAR(255) NOT NULL,
        issuer VARCHAR(255) NOT NULL,
        action VARCHAR(50) NOT NULL,
        timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Grant permissions (will be used by OIDC-authenticated users)
    GRANT SELECT ON products TO PUBLIC;
    GRANT ALL ON access_log TO PUBLIC;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO PUBLIC;
  
  pg_hba_oidc.conf: |
    # PostgreSQL Client Authentication Configuration for OIDC
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    
    # Allow local connections with password (for admin)
    local   all             postgres                                peer
    host    all             postgres        127.0.0.1/32            scram-sha-256
    host    all             postgres        ::1/128                 scram-sha-256
    
    # Allow OIDC authentication for all other users
    # The 'oauth' method uses pg_oidc_validator to validate Entra ID tokens
    host    all             all             0.0.0.0/0               oauth
    host    all             all             ::/0                    oauth

  postgresql_oidc.conf: |
    # PostgreSQL OIDC Configuration
    # These settings configure pg_oidc_validator for Microsoft Entra ID
    
    # Load the OIDC validator library
    shared_preload_libraries = 'pg_oidc_validator'
    
    # OAuth/OIDC settings (will be overridden by environment variables)
    # oauth.validator_library = 'pg_oidc_validator'
    # oauth.issuer is set via AZURE_TENANT_ID environment variable
    # oauth.client_id is set via AZURE_CLIENT_ID environment variable
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: oidc-postgres-demo
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: oidc-postgres-demo
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          # PostgreSQL 18 with pg_oidc_validator
          # Note: As of early 2026, you may need to build a custom image or use
          # a community image that includes pg_oidc_validator
          image: postgres:18
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_DB
            # Entra ID configuration for pg_oidc_validator
            - name: AZURE_TENANT_ID
              valueFrom:
                configMapKeyRef:
                  name: postgresql-config
                  key: AZURE_TENANT_ID
            - name: AZURE_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: postgresql-config
                  key: AZURE_CLIENT_ID
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: config
              mountPath: /etc/postgresql/conf.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init
            items:
              - key: init.sql
                path: init.sql
        - name: config
          configMap:
            name: postgresql-init
            items:
              - key: pg_hba_oidc.conf
                path: pg_hba.conf
              - key: postgresql_oidc.conf
                path: postgresql.conf
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
