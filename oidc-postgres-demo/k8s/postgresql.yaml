apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: oidc-postgres-demo
type: Opaque
stringData:
  POSTGRES_USER: apiserver
  POSTGRES_PASSWORD: apiserver-secret-password
  POSTGRES_DB: demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: oidc-postgres-demo
data:
  init.sql: |
    -- Create sample table for demo
    CREATE TABLE IF NOT EXISTS products (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        description TEXT,
        price DECIMAL(10,2),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Insert sample data
    INSERT INTO products (name, description, price) VALUES
        ('Widget A', 'A high-quality widget for all your needs', 29.99),
        ('Gadget B', 'The latest gadget with advanced features', 149.99),
        ('Tool C', 'Professional-grade tool for experts', 79.99),
        ('Device D', 'Smart device with IoT connectivity', 199.99),
        ('Component E', 'Essential component for your projects', 9.99);
    
    -- Create users table to track OIDC-authenticated users
    CREATE TABLE IF NOT EXISTS access_log (
        id SERIAL PRIMARY KEY,
        subject VARCHAR(255) NOT NULL,
        issuer VARCHAR(255) NOT NULL,
        action VARCHAR(50) NOT NULL,
        timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: oidc-postgres-demo
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: oidc-postgres-demo
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgresql-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
