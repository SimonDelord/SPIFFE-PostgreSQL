apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: oidc-postgres-demo
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres-admin-password
  POSTGRES_DB: demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: oidc-postgres-demo
data:
  init.sql: |
    -- Create sample table for demo
    CREATE TABLE IF NOT EXISTS products (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        description TEXT,
        price DECIMAL(10,2),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Insert sample data
    INSERT INTO products (name, description, price) VALUES
        ('Widget A', 'A high-quality widget for all your needs', 29.99),
        ('Gadget B', 'The latest gadget with advanced features', 149.99),
        ('Tool C', 'Professional-grade tool for experts', 79.99),
        ('Device D', 'Smart device with IoT connectivity', 199.99),
        ('Component E', 'Essential component for your projects', 9.99);
    
    -- Create access log table to track authenticated users
    CREATE TABLE IF NOT EXISTS access_log (
        id SERIAL PRIMARY KEY,
        subject VARCHAR(255) NOT NULL,
        issuer VARCHAR(255) NOT NULL,
        action VARCHAR(50) NOT NULL,
        timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Create a role for OIDC users
    CREATE ROLE oidc_users;
    GRANT SELECT ON products TO oidc_users;
    GRANT ALL ON access_log TO oidc_users;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO oidc_users;
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: oidc-postgres-demo
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: oidc-postgres-demo
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:18
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_DB
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init
            items:
              - key: init.sql
                path: init.sql
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
