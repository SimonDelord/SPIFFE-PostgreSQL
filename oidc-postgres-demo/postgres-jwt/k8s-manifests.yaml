# PostgreSQL with pgjwt extension for JWT validation
# PostgreSQL validates Entra ID tokens directly and uses RLS for authorization
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-jwt-password
  namespace: oidc-postgres-demo
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres-admin-password"
  JWT_CLIENT_PASSWORD: "jwt-client-password"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-jwt
  namespace: oidc-postgres-demo
spec:
  selector:
    app: postgres-jwt
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-jwt-data
  namespace: oidc-postgres-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: postgres-jwt
  namespace: oidc-postgres-demo

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: postgres-jwt
  namespace: oidc-postgres-demo
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: postgres-jwt:latest

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-jwt
  namespace: oidc-postgres-demo
spec:
  serviceName: postgres-jwt
  replicas: 1
  selector:
    matchLabels:
      app: postgres-jwt
  template:
    metadata:
      labels:
        app: postgres-jwt
    spec:
      serviceAccountName: postgres-oidc-sa
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: image-registry.openshift-image-registry.svc:5000/oidc-postgres-demo/postgres-jwt:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-jwt-password
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-jwt-data
