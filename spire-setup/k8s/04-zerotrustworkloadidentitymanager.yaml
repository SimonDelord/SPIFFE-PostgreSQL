# Update trustDomain and clusterName to match your environment
apiVersion: operator.openshift.io/v1alpha1
kind: ZeroTrustWorkloadIdentityManager
metadata:
  name: cluster
  labels:
    app.kubernetes.io/name: zero-trust-workload-identity-manager
    app.kubernetes.io/managed-by: zero-trust-workload-identity-manager
spec:
  # IMPORTANT: Update this to your cluster's apps domain
  # Example: apps.rosa.my-cluster.xxxx.p3.openshiftapps.com
  trustDomain: "apps.YOUR-CLUSTER-DOMAIN.com"
  
  # Name identifier for this cluster
  clusterName: "my-cluster"
  
  # ConfigMap that will contain the SPIRE CA bundle
  bundleConfigMap: "spire-bundle"
