apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server
  namespace: zero-trust-workload-identity-manager
data:
  server.conf: |
    {
      "health_checks": {
        "bind_address": "0.0.0.0",
        "bind_port": "8080",
        "listener_enabled": true,
        "live_path": "/live",
        "ready_path": "/ready"
      },
      "plugins": {
        "DataStore": [
          {
            "sql": {
              "plugin_data": {
                "connection_string": "/run/spire/data/datastore.sqlite3",
                "database_type": "sqlite3",
                "disable_migration": false,
                "max_idle_conns": 10,
                "max_open_conns": 100
              }
            }
          }
        ],
        "KeyManager": [
          {
            "disk": {
              "plugin_data": {
                "keys_path": "/run/spire/data/keys.json"
              }
            }
          }
        ],
        "NodeAttestor": [
          {
            "k8s_psat": {
              "plugin_data": {
                "clusters": [
                  {
                    "rosa-v99n5": {
                      "allowed_node_label_keys": [],
                      "allowed_pod_label_keys": [],
                      "audience": [
                        "spire-server"
                      ],
                      "service_account_allow_list": [
                        "zero-trust-workload-identity-manager:spire-agent"
                      ]
                    }
                  }
                ]
              }
            }
          }
        ],
        "Notifier": [
          {
            "k8sbundle": {
              "plugin_data": {
                "config_map": "spire-bundle",
                "namespace": "zero-trust-workload-identity-manager"
              }
            }
          }
        ],
        "UpstreamAuthority": [
          {
            "disk": {
              "plugin_data": {
                "cert_file_path": "/run/spire/upstream-ca/ca.crt",
                "key_file_path": "/run/spire/upstream-ca/ca.key"
              }
            }
          }
        ]
      },
      "server": {
        "audit_log_enabled": false,
        "bind_address": "0.0.0.0",
        "bind_port": "8081",
        "ca_key_type": "rsa-2048",
        "ca_subject": [
          {
            "common_name": "SPIRE Server CA",
            "country": [
              "US"
            ],
            "organization": [
              "My Organization"
            ]
          }
        ],
        "ca_ttl": "8760h0m0s",
        "data_dir": "/run/spire/data",
        "default_jwt_svid_ttl": "5m0s",
        "default_x509_svid_ttl": "1h0m0s",
        "jwt_issuer": "https://oidc-discovery.apps.rosa.rosa-v99n5.8ie9.p3.openshiftapps.com",
        "jwt_key_type": "rsa-2048",
        "log_format": "text",
        "log_level": "info",
        "trust_domain": "apps.rosa.rosa-v99n5.8ie9.p3.openshiftapps.com"
      },
      "telemetry": {
        "Prometheus": {
          "host": "0.0.0.0",
          "port": "9402"
        }
      }
    }
