apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: db-client-workload
spec:
  # SPIFFE ID template - the identity issued to this workload
  spiffeIDTemplate: "spiffe://{{ .TrustDomain }}/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
  
  # Select pods with this label
  podSelector:
    matchLabels:
      spiffe.io/spiffe-id: "db-client-app"
  
  # Namespace selector (optional - restrict to specific namespaces)
  namespaceSelector:
    matchLabels:
      app.kubernetes.io/part-of: spiffe-demo
  
  # DNS names to include in the certificate
  # IMPORTANT: This sets both the DNS SAN and the CN (Common Name)
  # PostgreSQL uses the CN as the username when using 'cert' authentication
  # Reference: https://gitea.jamma.life/jmhbnz/talks/src/branch/main/2026-04-03-openshift-ztwim
  dnsNameTemplates:
    - "app_readonly"
  
  # TTL for the SVID
  ttl: "1h"
